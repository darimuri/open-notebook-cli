name: Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Get dependencies
        run: go mod download

      - name: Build Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
          VERSION: ${{ github.ref_name }}
        run: go build -ldflags "-X github.com/darimuri/open-notebook-cli/cmd.version=$VERSION" -o open-notebook-linux-amd64 ./main.go

      - name: Build Linux arm64
        env:
          GOOS: linux
          GOARCH: arm64
          VERSION: ${{ github.ref_name }}
        run: go build -ldflags "-X github.com/darimuri/open-notebook-cli/cmd.version=$VERSION" -o open-notebook-linux-arm64 ./main.go

      - name: Build Darwin amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          VERSION: ${{ github.ref_name }}
        run: go build -ldflags "-X github.com/darimuri/open-notebook-cli/cmd.version=$VERSION" -o open-notebook-darwin-amd64 ./main.go

      - name: Build Darwin arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          VERSION: ${{ github.ref_name }}
        run: go build -ldflags "-X github.com/darimuri/open-notebook-cli/cmd.version=$VERSION" -o open-notebook-darwin-arm64 ./main.go

      - name: Build Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
          VERSION: ${{ github.ref_name }}
        run: go build -ldflags "-X github.com/darimuri/open-notebook-cli/cmd.version=$VERSION" -o open-notebook-windows-amd64.exe ./main.go

      - name: Build Windows arm64
        env:
          GOOS: windows
          GOARCH: arm64
          VERSION: ${{ github.ref_name }}
        run: go build -ldflags "-X github.com/darimuri/open-notebook-cli/cmd.version=$VERSION" -o open-notebook-windows-arm64.exe ./main.go

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            open-notebook-linux-amd64
            open-notebook-linux-arm64
            open-notebook-darwin-amd64
            open-notebook-darwin-arm64
            open-notebook-windows-amd64.exe
            open-notebook-windows-arm64.exe
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}