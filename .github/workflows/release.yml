name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos:
          - linux
          - darwin
          - windows
        goarch:
          - amd64
          - arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Get dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi
          name="open-notebook-${GOOS}-${GOARCH}$ext"
          go build -ldflags "-X github.com/darimuri/open-notebook-cli/cmd.version=$VERSION" -o "$name" ./main.go
          ls -la "$name"

      - name: Upload Release Asset
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            open-notebook-${{ matrix.goos }}-${{ matrix.goarch }}*.exe
            open-notebook-${{ matrix.goos }}-${{ matrix.goarch }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          token: ${{ secrets.GITHUB_TOKEN }}