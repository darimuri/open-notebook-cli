name: Update Skill Versions

on:
  release:
    types: [published]

jobs:
  update-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Update version files
        run: |
          # Update marketplace.json
          sed -i 's/"version": "[^"]*"/"version": "${{ github.event.release.tag_name }}"/' .claude-plugin/marketplace.json
          # Update SKILL.md
          sed -i 's/version: "[^"]*"/version: "${{ github.event.release.tag_name }}"/' skills/open-notebook/SKILL.md

          # Show changes
          git diff --stat

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "Update skill version to ${{ github.event.release.tag_name }}"
          git push